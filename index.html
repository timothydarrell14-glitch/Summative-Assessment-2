<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA Dictionary</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/9c4ac422b2.js" crossorigin="anonymous"></script>
    <script src="index.js" defer></script>
</head>

<body>
    <section id="main">
        <header>
            <h1><i class="fa-solid fa-book-open"></i>MyDictionary</h1>
            <nav id="nav">
                <a href="">Home</a>
                <a href="">About Us</a>
                <a href="#">Contact</a>
            </nav>
        </header>
        <section>
            <div id="search-sec">
                <button id="history" aria-label="Previous Searches"><i class="fa-solid fa-clock-rotate-left"></i>
                    History</button>
                <input aria-label="Search word" id="search_word" type="text" name="search-word"
                    placeholder="Please Enter Search Word"><br>
                <button aria-label="Search for word" type="submit" id="search">Search <i
                        class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </section>
        <!-- <section id="historie">
            <select title ="history" id="select">Recent Searches</select>
        </section> -->
        <section id="src-wrd"></section>
        <section>
            <div id="entertain">
                <div id="d-2">
                    <div id>
                        <h2>Word of the Day</h2>
                    </div>
                    <div id="pronounce">
                        <h3 id="w-word"></h3>
                        <p id="p_pronounce"></p>
                    </div>
                    <div id="defo">
                        <span><em></em></span>
                    </div>
                    <div id="ex">
                            <h3 id="example"> Example:- </h3>
                    </div>

                </div>
        </section>
        <section id="extra">
            <div id="interest">
                <h1>Discover Vocabulary</h1>
                <div>
                    <nav>
                        <div>
                            <h2>Ambigrams</h2>
                            <p>Definition</p>
                            <p>Examples </p>
                        </div>
                        <div>
                            <h2>Palindrome</h2>
                            <p>Definition</p>
                            <p>Examples </p>
                        </div>
                        <div>
                            <h2>Semordnilaps</h2>
                            <p>Definition</p>
                            <p>Examples</p>
                        </div>
                        <div>
                            <h2>Onomatopoeic Palindromes</h2>
                            <p>Definition</p>
                            <p>Examples </p>
                        </div>
                    </nav>
                </div>
            </div>
            </div>
            </div>
        </section>
        <footer>
            <ul>
                <li>
                    <nav><i class="fa-brands fa-youtube"></i></nav>
                </li>
                <li>
                    <nav><i class="fa-brands fa-x-twitter"></i></nav>
                </li>
                <li>
                    <nav><i class="fa-solid fa-envelope"></i></nav>
                </li>
            </ul>
        </footer>
    </section>
</body>

</html>
