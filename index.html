<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA Dictionary</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js" defer></script>
</head>
<body>
    <header>
        <h1><i>Icon of website</i>Name of website</h1>
        <nav id="nav">
            <ul>
                <li>Home</li>
                <li>Search</li>
                <li>About</li>
            </ul>
            
        </nav>
    </header>
    <main>
        <section>
            <div id="search-sec">
              <input id="search_word" type="text" name="search-word" placeholder="Please Enter Search Word"><br>
              <button type="submit" id="search">Search</button>
            </div>
            <div id="new-words">
                <nav>Different types of words</nav>
            </div>
        </section>
    </main>
    <section id="output">
        <div>Searched Word</div>
    <section id="entertain">
        <div>
            <h3>Word of the Day</h3>
            <p>Word</p>
            <button type="button" id="pronounce">(Pronounciation)</button>
            <p>Definition</p>
        </div>
        <div>
            <h3>Vocabulary Finds</h3>
        </div>
        </section>
    </section>
    <footer>
        <p id="web-name">Website Name</p>
        <ul>
            <li>
                <p id="">Phone Number</p>
            </li>
            <li>
                <p>About Us</p>
            </li>
            <li>
                <p>Email</p>
            </li>
        </ul>
        <ul>
            <li>
                <nav><button>yt</button></nav>
            </li>
            <li>
                <nav><button>twitter</button></nav>
            </li>
            <li>
                <nav><button>Email</button></nav>
            </li>
        </ul>
    </footer>

    
</body>
</html>
